<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的空间</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1a;
      --bg-secondary: #111827;
      --fg: #f0f4f8;
      --muted: #6b7a8f;
      --accent: #f59e0b;
      --accent-glow: rgba(245, 158, 11, 0.3);
      --card: rgba(17, 24, 39, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
      --love: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-display { font-family: 'ZCOOL KuaiLe', cursive; }

    .bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .login-page {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .login-page.hidden {
      opacity: 0;
      transform: scale(1.1);
      pointer-events: none;
    }

    .login-card {
      background: linear-gradient(135deg, rgba(17, 24, 39, 0.95), rgba(30, 41, 59, 0.9));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 100px var(--accent-glow);
    }

    .input-field {
      width: 100%;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-size: 16px;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-field::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      border: none;
      border-radius: 12px;
      color: #000;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    .space-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
    }

    .space-page.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10, 15, 26, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .avatar-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto;
      cursor: pointer;
    }

    .avatar-ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #d97706, #fbbf24);
      padding: 4px;
      animation: avatar-glow 3s ease-in-out infinite;
    }

    @keyframes avatar-glow {
      0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
      50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px var(--accent-glow); }
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      color: var(--accent);
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-edit {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .avatar-container:hover .avatar-edit {
      opacity: 1;
    }

    .moment-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .moment-card:hover {
      border-color: rgba(245, 158, 11, 0.3);
    }

    .moment-input {
      width: 100%;
      min-height: 100px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-size: 16px;
      resize: none;
      outline: none;
      transition: all 0.3s ease;
    }

    .moment-input:focus { border-color: var(--accent); }

    .tab-btn {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }

    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::after { width: 60%; }
    .tab-btn:hover { color: var(--fg); }

    .friend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .friend-item:hover { background: rgba(255, 255, 255, 0.05); }

    .friend-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }

    .online-dot {
      width: 10px;
      height: 10px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-item:hover {
      transform: scale(1.02);
      z-index: 10;
    }

    .photo-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 28px;
      height: 28px;
      background: rgba(239, 68, 68, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      cursor: pointer;
    }

    .photo-item:hover .photo-delete {
      opacity: 1;
    }

    .message-item {
      position: relative;
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      border-left: 3px solid var(--accent);
    }

    .message-delete {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      opacity: 0;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message-item:hover .message-delete {
      opacity: 1;
    }

    .message-delete:hover {
      color: var(--love);
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .delete-btn:hover {
      color: var(--love);
      background: rgba(239, 68, 68, 0.1);
    }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--accent), #d97706);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--accent-glow);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .login-card { margin: 20px; padding: 32px; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <canvas class="bg-canvas" id="bgCanvas"></canvas>

  <input type="file" id="avatarInput" accept="image/*" style="display:none">
  <input type="file" id="photoInput" accept="image/*" multiple style="display:none">

  <!-- 登录页面 -->
  <div class="login-page" id="loginPage">
    <div class="login-card">
      <div class="text-center mb-8">
        <h1 class="font-display text-4xl mb-2" style="color: var(--accent);">我的空间</h1>
        <p class="text-sm" style="color: var(--muted);">记录生活，分享快乐</p>
      </div>

      <div class="space-y-5">
        <div>
          <label class="block text-sm mb-2" style="color: var(--muted);">账号</label>
          <input type="text" id="username" class="input-field" placeholder="请输入账号" autocomplete="off">
        </div>

        <div>
          <label class="block text-sm mb-2" style="color: var(--muted);">密码</label>
          <input type="password" id="password" class="input-field" placeholder="请输入密码">
        </div>

        <div id="loginError" class="text-sm hidden" style="color: var(--love);">
          账号或密码错误
        </div>

        <button class="btn-primary mt-6" onclick="handleLogin()">登录空间</button>
      </div>
    </div>
  </div>

  <!-- 空间主页 -->
  <div class="space-page" id="spacePage">
    <nav class="top-nav">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="font-display text-2xl" style="color: var(--accent);">我的空间</span>
        </div>
        <div class="flex items-center gap-4">
          <button class="p-2 rounded-lg hover:bg-white/5 transition" title="消息">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
          <button onclick="handleLogout()" class="px-4 py-2 rounded-lg text-sm font-medium transition" style="background: rgba(255,255,255,0.1);">
            退出
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <aside class="lg:col-span-3 space-y-4">
          <div class="profile-card">
            <div class="h-32 bg-gradient-to-r from-amber-600 via-orange-500 to-yellow-500 relative">
              <div class="absolute inset-0 bg-black/20"></div>
            </div>
            
            <div class="px-5 pb-5 -mt-12 relative">
              <div class="avatar-container" onclick="document.getElementById('avatarInput').click()">
                <div class="avatar-ring">
                  <div class="avatar" id="userAvatar">U</div>
                </div>
                <div class="avatar-edit">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                  </svg>
                </div>
              </div>
              
              <div class="text-center mt-4">
                <h2 class="text-xl font-bold mb-1" id="displayName">用户</h2>
                <p class="text-sm mb-3" style="color: var(--muted);">这个人很懒，什么都没写</p>
                
                <div class="flex justify-center gap-6 text-sm">
                  <div class="text-center">
                    <div class="font-bold text-lg" style="color: var(--accent);" id="momentCount">0</div>
                    <div style="color: var(--muted);">说说</div>
                  </div>
                  <div class="text-center">
                    <div class="font-bold text-lg" style="color: var(--accent);" id="photoCount">0</div>
                    <div style="color: var(--muted);">照片</div>
                  </div>
                  <div class="text-center">
                    <div class="font-bold text-lg" style="color: var(--accent);" id="messageCount">0</div>
                    <div style="color: var(--muted);">留言</div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="profile-card p-4">
            <h3 class="font-bold mb-3 flex items-center gap-2">
              <span>好友</span>
              <span class="text-xs px-2 py-0.5 rounded-full" style="background: var(--accent); color: #000;">5在线</span>
            </h3>
            <div class="space-y-1 max-h-64 overflow-y-auto" id="friendList"></div>
          </div>
        </aside>

        <section class="lg:col-span-6 space-y-4">
          <div class="profile-card">
            <div class="flex border-b" style="border-color: var(--border);">
              <button class="tab-btn active" data-tab="moments" onclick="switchTab('moments')">说说</button>
              <button class="tab-btn" data-tab="photos" onclick="switchTab('photos')">相册</button>
              <button class="tab-btn" data-tab="messages" onclick="switchTab('messages')">留言板</button>
            </div>
          </div>

          <div id="momentsContent">
            <div class="moment-card">
              <textarea class="moment-input" id="newMoment" placeholder="这一刻的想法..."></textarea>
              <div class="flex items-center justify-between mt-4">
                <div class="flex gap-2">
                  <button class="p-2 rounded-lg hover:bg-white/5 transition" title="表情">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"></circle>
                      <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                      <line x1="9" y1="9" x2="9.01" y2="9"></line>
                      <line x1="15" y1="9" x2="15.01" y2="9"></line>
                    </svg>
                  </button>
                </div>
                <button onclick="postMoment()" class="px-6 py-2 rounded-lg font-medium transition" style="background: var(--accent); color: #000;">
                  发表
                </button>
              </div>
            </div>
            <div class="space-y-4" id="momentsList"></div>
          </div>

          <div id="photosContent" class="hidden">
            <div class="moment-card">
              <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold">我的相册</h3>
                <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                  </svg>
                  上传照片
                </button>
              </div>
              <div class="photo-grid" id="photoGrid"></div>
              <div id="photoEmpty" class="text-center py-12 hidden" style="color: var(--muted);">
                <svg class="mx-auto mb-3" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <circle cx="8.5" cy="8.5" r="1.5"></circle>
                  <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <p>还没有照片，点击上方按钮上传</p>
              </div>
            </div>
          </div>

          <div id="messagesContent" class="hidden">
            <div class="moment-card mb-4">
              <textarea class="moment-input" id="newMessage" placeholder="给主人留言..."></textarea>
              <button onclick="postMessage()" class="mt-4 px-6 py-2 rounded-lg font-medium transition" style="background: var(--accent); color: #000;">
                留言
              </button>
            </div>
            <div class="space-y-3" id="messagesList"></div>
            <div id="messageEmpty" class="text-center py-12 hidden" style="color: var(--muted);">
              <p>还没有留言，快来抢沙发吧</p>
            </div>
          </div>
        </section>

        <aside class="lg:col-span-3 space-y-4">
          <div class="profile-card p-4">
            <h3 class="font-bold mb-3">最近访客</h3>
            <div class="flex flex-wrap gap-2" id="visitors"></div>
          </div>

          <div class="profile-card p-4">
            <h3 class="font-bold mb-3">空间装扮</h3>
            <div class="grid grid-cols-2 gap-2">
              <button onclick="changeTheme('amber')" class="p-3 rounded-lg text-sm font-medium transition" style="background: linear-gradient(135deg, #f59e0b, #d97706);">暖阳</button>
              <button onclick="changeTheme('cyan')" class="p-3 rounded-lg text-sm font-medium transition" style="background: linear-gradient(135deg, #06b6d4, #0891b2);">清澈</button>
              <button onclick="changeTheme('rose')" class="p-3 rounded-lg text-sm font-medium transition" style="background: linear-gradient(135deg, #f43f5e, #e11d48);">绚烂</button>
              <button onclick="changeTheme('emerald')" class="p-3 rounded-lg text-sm font-medium transition" style="background: linear-gradient(135deg, #10b981, #059669);">自然</button>
            </div>
          </div>

          <div class="profile-card p-4">
            <h3 class="font-bold mb-3">数据管理</h3>
            <button onclick="clearAllData()" class="w-full py-2 rounded-lg text-sm font-medium transition" style="background: rgba(239, 68, 68, 0.2); color: var(--love);">
              清空所有数据
            </button>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script>
    // ========== 固定账号密码 ==========
    const VALID_ACCOUNTS = {
      'fengxueasd': { password: '123456', displayName: '风雪' },
      '豆豆': { password: '123456', displayName: '豆豆' }
    };

    // ========== 数据初始化 ==========
    const STORAGE_KEY = 'myspace_data';
    
    const defaultData = {
      user: { name: '', avatar: '' },
      moments: [
        { id: 1, user: '我', content: '今天天气真好，出去走走，心情舒畅！', time: '2小时前', likes: 12, comments: 3, liked: false },
        { id: 2, user: '我', content: '刚看完一部电影，感触很深。人生就像一场旅行，不必在乎目的地，在乎的是沿途的风景。', time: '昨天', likes: 28, comments: 7, liked: true },
      ],
      photos: [],
      messages: [
        { id: 1, user: '小明', content: '好久不见，最近怎么样？', time: '2天前' },
        { id: 2, user: '小红', content: '你的空间装扮得真好看！', time: '5天前' },
      ]
    };

    const friends = [
      { name: '小明', online: true, color: '#3b82f6' },
      { name: '小红', online: true, color: '#ec4899' },
      { name: '阿杰', online: false, color: '#8b5cf6' },
      { name: '小芳', online: true, color: '#10b981' },
      { name: '大伟', online: false, color: '#f59e0b' },
    ];

    const visitors = [
      { name: '小明', time: '10分钟前' },
      { name: '小红', time: '1小时前' },
      { name: '阿杰', time: '3小时前' },
    ];

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch (e) {
          return { ...defaultData };
        }
      }
      return { ...defaultData };
    }

    function saveData() {
      const data = {
        user: currentUser,
        moments: moments,
        photos: photos,
        messages: messages
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        alert('存储空间已满，请删除一些照片后重试');
      }
    }

    let appData = loadData();
    let currentUser = appData.user;
    let moments = appData.moments;
    let photos = appData.photos;
    let messages = appData.messages;

    // ========== 背景动画 ==========
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = [];
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2 + 1,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          alpha: Math.random() * 0.5 + 0.1
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const gradient = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.width / 2);
      gradient.addColorStop(0, '#111827');
      gradient.addColorStop(1, '#0a0f1a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.radius), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(245, 158, 11, ${p.alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(drawParticles);
    }

    // ========== 图片压缩 ==========
    function compressImage(file, maxWidth, callback) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          callback(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ========== 登录验证 ==========
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      
      // 验证账号密码
      if (!VALID_ACCOUNTS[username] || VALID_ACCOUNTS[username].password !== password) {
        errorEl.textContent = '账号或密码错误';
        errorEl.classList.remove('hidden');
        return;
      }
      
      errorEl.classList.add('hidden');
      
      // 设置用户信息
      currentUser.name = VALID_ACCOUNTS[username].displayName;
      
      document.getElementById('displayName').textContent = currentUser.name;
      updateAvatar();
      
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('spacePage').classList.add('visible');
      
      renderAll();
    }

    function handleLogout() {
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('spacePage').classList.remove('visible');
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    // ========== 头像上传 ==========
    document.getElementById('avatarInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      compressImage(file, 200, function(dataUrl) {
        currentUser.avatar = dataUrl;
        saveData();
        updateAvatar();
      });
      
      e.target.value = '';
    });

    function updateAvatar() {
      const avatarEl = document.getElementById('userAvatar');
      if (currentUser.avatar) {
        avatarEl.innerHTML = `<img src="${currentUser.avatar}" alt="头像">`;
      } else {
        avatarEl.innerHTML = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'U';
      }
    }

    // ========== 照片上传 ==========
    document.getElementById('photoInput').addEventListener('change', function(e) {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;
      
      let processed = 0;
      files.forEach(file => {
        compressImage(file, 800, function(dataUrl) {
          photos.unshift({
            id: Date.now() + Math.random(),
            url: dataUrl
          });
          processed++;
          if (processed === files.length) {
            saveData();
            renderPhotos();
            updateCounts();
          }
        });
      });
      
      e.target.value = '';
    });

    // ========== 渲染函数 ==========
    function renderAll() {
      renderFriends();
      renderMoments();
      renderPhotos();
      renderMessages();
      renderVisitors();
      updateCounts();
    }

    function updateCounts() {
      document.getElementById('momentCount').textContent = moments.length;
      document.getElementById('photoCount').textContent = photos.length;
      document.getElementById('messageCount').textContent = messages.length;
    }

    function renderFriends() {
      const container = document.getElementById('friendList');
      container.innerHTML = friends.map(f => `
        <div class="friend-item">
          <div class="friend-avatar" style="background: linear-gradient(135deg, ${f.color},${f.color}88);">${f.name.charAt(0)}</div>
          <div class="flex-1">
            <div class="font-medium">${f.name}</div>
            <div class="text-xs" style="color: var(--muted);">${f.online ? '在线' : '离线'}</div>
          </div>${f.online ? '<div class="online-dot"></div>' : ''}
        </div>
      `).join('');
    }

    function renderMoments() {
      const container = document.getElementById('momentsList');
      if (moments.length === 0) {
        container.innerHTML = `<div class="text-center py-8" style="color: var(--muted);">还没有说说，发表第一条吧</div>`;
        return;
      }
      
      container.innerHTML = moments.map(m => `
        <div class="moment-card fade-in">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center font-bold overflow-hidden" style="background: linear-gradient(135deg, var(--accent), #d97706); color: #000;">
              ${currentUser.avatar ? `<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;">` : (currentUser.name ? currentUser.name.charAt(0) : 'U')}
            </div>
            <div class="flex-1">
              <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-2">
                  <span class="font-bold">${m.user}</span>
                  <span class="text-xs" style="color: var(--muted);">${m.time}</span>
                </div>
                <button class="delete-btn" onclick="deleteMoment(${m.id})" title="删除">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
              <p class="mb-3 leading-relaxed">${m.content}</p>
              <div class="flex items-center gap-4">
                <button onclick="toggleLike(${m.id})" class="flex items-center gap-1 text-sm transition hover:scale-105" style="color:${m.liked ? 'var(--love)' : 'var(--muted)'};">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="${m.liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                  </svg>
                  <span>${m.likes}</span>
                </button>
                <span class="flex items-center gap-1 text-sm" style="color: var(--muted);">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                  </svg>
                  <span>${m.comments}</span>
                </span>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderPhotos() {
      const container = document.getElementById('photoGrid');
      const emptyEl = document.getElementById('photoEmpty');
      
      if (photos.length === 0) {
        container.innerHTML = '';
        emptyEl.classList.remove('hidden');
        return;
      }
      
      emptyEl.classList.add('hidden');
      container.innerHTML = photos.map(p => `
        <div class="photo-item fade-in">
          <img src="${p.url}" alt="照片">
          <div class="photo-delete" onclick="deletePhoto(${p.id})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
        </div>
      `).join('');
    }

    function renderMessages() {
      const container = document.getElementById('messagesList');
      const emptyEl = document.getElementById('messageEmpty');
      
      if (messages.length === 0) {
        container.innerHTML = '';
        emptyEl.classList.remove('hidden');
        return;
      }
      
      emptyEl.classList.add('hidden');
      container.innerHTML = messages.map(m => `
        <div class="message-item fade-in">
          <button class="message-delete" onclick="deleteMessage(${m.id})" title="删除">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <div class="flex items-center gap-2 mb-2">
            <span class="font-bold" style="color: var(--accent);">${m.user}</span>
            <span class="text-xs" style="color: var(--muted);">${m.time}</span>
          </div>
          <p>${m.content}</p>
        </div>
      `).join('');
    }

    function renderVisitors() {
      const container = document.getElementById('visitors');
      container.innerHTML = visitors.map(v => `
        <div class="flex flex-col items-center">
          <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold" style="background: linear-gradient(135deg, #3b82f6, #8b5cf6);">${v.name.charAt(0)}</div>
          <span class="text-xs mt-1" style="color: var(--muted);">${v.time}</span>
        </div>
      `).join('');
    }

    // ========== 交互函数 ==========
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      document.getElementById('momentsContent').classList.toggle('hidden', tab !== 'moments');
      document.getElementById('photosContent').classList.toggle('hidden', tab !== 'photos');
      document.getElementById('messagesContent').classList.toggle('hidden', tab !== 'messages');
    }

    function postMoment() {
      const input = document.getElementById('newMoment');
      const content = input.value.trim();
      if (!content) return;
      
      moments.unshift({
        id: Date.now(),
        user: currentUser.name || '我',
        content: content,
        time: '刚刚',
        likes: 0,
        comments: 0,
        liked: false
      });
      
      input.value = '';
      saveData();
      renderMoments();
      updateCounts();
    }

    function deleteMoment(id) {
      if (!confirm('确定删除这条说说吗？')) return;
      moments = moments.filter(m => m.id !== id);
      saveData();
      renderMoments();
      updateCounts();
    }

    function toggleLike(id) {
      const moment = moments.find(m => m.id === id);
      if (moment) {
        moment.liked = !moment.liked;
        moment.likes += moment.liked ? 1 : -1;
        saveData();
        renderMoments();
      }
    }

    function deletePhoto(id) {
      if (!confirm('确定删除这张照片吗？')) return;
      photos = photos.filter(p => p.id !== id);
      saveData();
      renderPhotos();
      updateCounts();
    }

    function postMessage() {
      const input = document.getElementById('newMessage');
      const content = input.value.trim();
      if (!content) return;
      
      messages.unshift({
        id: Date.now(),
        user: currentUser.name || '我',
        content: content,
        time: '刚刚'
      });
      
      input.value = '';
      saveData();
      renderMessages();
      updateCounts();
    }

    function deleteMessage(id) {
      if (!confirm('确定删除这条留言吗？')) return;
      messages = messages.filter(m => m.id !== id);
      saveData();
      renderMessages();
      updateCounts();
    }

    function changeTheme(theme) {
      const themes = {
        amber: { accent: '#f59e0b', glow: 'rgba(245, 158, 11, 0.3)' },
        cyan: { accent: '#06b6d4', glow: 'rgba(6, 182, 212, 0.3)' },
        rose: { accent: '#f43f5e', glow: 'rgba(244, 63, 94, 0.3)' },
        emerald: { accent: '#10b981', glow: 'rgba(16, 185, 129, 0.3)' }
      };
      const t = themes[theme];
      document.documentElement.style.setProperty('--accent', t.accent);
      document.documentElement.style.setProperty('--accent-glow', t.glow);
    }

    function clearAllData() {
      if (!confirm('确定清空所有数据吗？此操作不可恢复！')) return;
      localStorage.removeItem(STORAGE_KEY);
      moments = [];
      photos = [];
      messages = [];
      currentUser = { name: '', avatar: '' };
      saveData();
      renderAll();
      alert('数据已清空');
    }

    // ========== 初始化 ==========
    window.addEventListener('resize', initCanvas);
    initCanvas();
    
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      drawParticles();
    }

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
